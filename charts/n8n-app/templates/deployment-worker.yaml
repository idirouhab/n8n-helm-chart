{{- if .Values.queueMode.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "n8n.fullname" . }}-worker
  labels:
    {{- include "n8n.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.queueMode.workerReplicaCount }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "n8n.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "n8n.labels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ default (include "n8n.fullname" .) .Values.serviceAccount.name }}
      {{- end }}

      {{- if .Values.securityContext.enabled }}
      securityContext:
        fsGroup: {{ .Values.securityContext.fsGroup }}
        runAsUser: {{ .Values.securityContext.runAsUser }}
        runAsGroup: {{ .Values.securityContext.runAsGroup }}
      {{- end }}

      containers:
        - name: n8n-worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["n8n"]
          args: ["worker"]

          env:
            # --- Webhook URLs (not strictly required for worker, but harmless & consistent) ---
            {{- if and .Values.ingress .Values.ingress.enabled (gt (len .Values.ingress.hosts) 0) }}
            - name: N8N_WEBHOOK_URL
              value: "https://{{ (index .Values.ingress.hosts 0).host }}/webhook"
            - name: WEBHOOK_URL
              value: "https://{{ (index .Values.ingress.hosts 0).host }}/webhook"
            {{- end }}

            - name: TZ
              valueFrom:
                configMapKeyRef:
                  name: {{ include "n8n.fullname" . }}
                  key: TZ

            - name: DB_TYPE
              value: postgresdb
            - name: DB_POSTGRESDB
              value: {{ .Values.database.database | quote }}
            - name: DB_POSTGRESDB_HOST
              value: {{ .Values.database.host | quote }}
            - name: DB_POSTGRESDB_PORT
              value: "{{ .Values.database.port }}"
            - name: DB_POSTGRESDB_USER
              value: {{ .Values.database.user | quote }}
            - name: DB_POSTGRESDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.passwordSecret.name }}
                  key: {{ .Values.database.passwordSecret.key }}

            - name: EXECUTIONS_MODE
              value: queue
            - name: QUEUE_BULL_REDIS_HOST
              value: {{ .Values.redis.host | quote }}
            - name: QUEUE_BULL_REDIS_PORT
              value: "{{ .Values.redis.port }}"
            {{- if .Values.redis.passwordSecret.name }}
            - name: QUEUE_BULL_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.passwordSecret.name }}
                  key: {{ .Values.redis.passwordSecret.key }}
            {{- end }}

            # --- N8N encryption key (must match mains) ---
            - name: N8N_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ if .Values.secretRefs.existingSecret }}{{ .Values.secretRefs.existingSecret }}{{ else }}{{ include "n8n.fullname" . }}{{ end }}
                  key: N8N_ENCRYPTION_KEY

            {{- with .Values.config.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}

          resources:
            {{- toYaml .Values.resources.worker | nindent 12 }}

      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
