# ----- Image -----
image:
  repository: n8nio/n8n
  tag: "1.64.0"
  pullPolicy: IfNotPresent

# ----- Names -----
nameOverride: ""
fullnameOverride: ""

# ----- Main replicas -----
replicaCount: 1

# ----- Multi-main -----
multiMain:
  enabled: true
  replicas: 2
  antiAffinity:
    type: preferred
  topologySpreadConstraints:
    enabled: false
    maxSkew: 1
    whenUnsatisfiable: ScheduleAnyway


# ----- Queue mode -----
queueMode:
  enabled: true
  workerReplicaCount: 2

# ----- Service -----
service:
  type: ClusterIP
  port: 5678
  annotations: {}
  sessionAffinity:
    enabled: false
    timeoutSeconds: 10800

# ----- Ingress -----
ingress:
  enabled: true
  sticky:
    enabled: false
    cookieName: n8n_affinity
    cookieExpires: "172800"  # 2 days in seconds
    cookieMaxAge: "172800"   # 2 days in seconds
  hosts:
    - host: n8n.example.com   # <-- Change to your actual domain
      paths:
        - path: /
          pathType: Prefix

# ----- Persistence -----
persistence:
  enabled: false
  accessModes: ["ReadWriteOnce"]
  size: 10Gi
  storageClassName: ""

# ----- Resources -----
resources:
  main:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  worker:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

# ----- Node placement -----
nodeSelector: {}
tolerations: []
affinity: {}

# ----- Security -----
securityContext:
  enabled: true
  fsGroup: 1000
  runAsUser: 1000
  runAsGroup: 1000

# ----- RBAC ServiceAccount & Network Policy -----
rbac:
  create: true

serviceAccount:
  create: true
  name: n8n

networkPolicy:
  enabled: false

# ----- Health checks -----
probes:
  liveness:
    enabled: true
    path: /healthz
    initialDelaySeconds: 30
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 6
  readiness:
    enabled: true
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 6

# ----- Autoscaling -----
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 90

# ----- Pod Disruption Budget -----
pdb:
  enabled: true
  minAvailable: 1

# ----- App config -----
config:
  timezone: Europe/Madrid
  extraEnv: []
  extraEnvFrom: []

# ----- Secrets -----
secretRefs:
  existingSecret: ""
  env:
    N8N_ENCRYPTION_KEY: "change-me-to-a-long-random-key"
    N8N_HOST: "n8n.example.com"  # <-- Change to your actual domain
    N8N_PORT: "5678"
    N8N_PROTOCOL: "http"

# ----- Database (PostgreSQL) -----
database:
  type: postgres
  useExternal: true
  host: "your-postgres-hostname"     # <-- Change to your actual PostgreSQL host
  port: 5432
  database: n8n
  user: masteruser
  passwordSecret:
    name: "password"                 # <-- K8s Secret name
    key: "password"                  # <-- Key inside the secret

# ----- Redis (for queue mode) -----
redis:
  enabled: false
  useExternal: true
  host: "rmy-redis-cluster.devtii.0001.use1.cache.amazonaws.com"        # <-- Change to your actual Redis host
  port: 6379
  passwordSecret: null
